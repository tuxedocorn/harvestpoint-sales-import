name: Sync Harvestpoint Sales Orders to Smartsheet

on:
  schedule:
    # Every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in TEST_MODE (print rows instead of writing to Smartsheet)'
        required: false
        default: 'false'
      lookahead_days:
        description: 'Override lookahead window (days)'
        required: false
        default: '60'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          HARVESTPOINT_EMAIL: ${{ secrets.HARVESTPOINT_EMAIL }}
          HARVESTPOINT_PASS: ${{ secrets.HARVESTPOINT_PASS }}
          SMARTSHEET_TOKEN: ${{ secrets.SMARTSHEET_TOKEN }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          LOOKAHEAD_DAYS: ${{ github.event.inputs.lookahead_days || '60' }}
        run: python sales_order_import.py
